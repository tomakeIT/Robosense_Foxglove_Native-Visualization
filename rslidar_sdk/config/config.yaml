common:
  msg_source: 1                         # 1: packet message comes from online LiDAR
                                        # 3: packet message comes from PCAP file

foxglove:
  host: 127.0.0.1                       # Foxglove WebSocket bind host
  port: 8765                            # Foxglove WebSocket bind port
  topic: /rslidar_points                # Base topic name in Foxglove
  frame_id: rslidar                     # frame_id in Foxglove PointCloud
  prealloc_points: 300000               # reserve encoded point bytes upfront (memory for lower jitter)
  prealloc_cloud_msgs: 32               # number of pre-allocated cloud message objects
  prealloc_points_per_msg: 300000       # reserve points in each pre-allocated cloud object
  max_pending_frames: 2                 # cap queued frames to avoid accumulating latency
  low_latency_drop_old_frames: true     # true: drop queued old frames and keep newest to reduce display lag
  drop_log_every: 100                   # log every N dropped frames, 0 to disable

lidar:
  - driver:
      lidar_type: RSM2             #  LiDAR type - RS16, RS32, RSBP, RSAIRY, RSHELIOS, RSHELIOS_16P, RS128, RS80, RS48, RSP128, RSP80, RSP48, 
                                   #               RSM1, RSM1_JUMBO, RSM2, RSM3, RSE1, RSMX.
                                   
      msop_port: 30099              #  Msop port of lidar
      difop_port: 30099             #  Difop port of lidar
      imu_port: 0                  #  IMU port of lidar(only for RSAIRY, RSE1), 0 means no imu.
      socket_recv_buf: 16777216      #  Socket receive buffer in bytes (increase to reduce packet loss on macOS)
                                   #  If you want to use IMU, please first set ENABLE_IMU_DATA_PARSE to ON in CMakeLists.txt 
      user_layer_bytes: 8          #  Bytes of user layer. thers is no user layer if it is 0         
      tail_layer_bytes: 0          #  Bytes of tail layer. thers is no tail layer if it is 0


      min_distance: 1.0            #  Minimum distance of point cloud
      max_distance: 250            #  Maximum distance of point cloud
      use_lidar_clock: true        #  true--Use the lidar clock as the message timestamp
                                   #  false-- Use the system clock as the timestamp
      dense_points: false          #  true: discard NAN points; false: reserve NAN points
      
      ts_first_point: true         #  true: time-stamp point cloud with the first point; false: with the last point;   
                                   #  these parameters are used from mechanical lidar

      start_angle: 0               #  Start angle of point cloud
      end_angle: 360               #  End angle of point cloud
      split_frame_mode: 3          #  1: by split_angle, 2: fixed blocks, 3: custom blocks
      split_angle: 0               #  used when split_frame_mode=1
      num_blks_split: 180          #  used when split_frame_mode=3; smaller => lower latency but less complete frame

                                   #  When msg_source is 3, the following parameters will be used
      pcap_repeat: true            #  true: The pcap bag will repeat play   
      pcap_rate: 1.0               #  Rate to read the pcap file
      pcap_path: /home/robosense/lidar.pcap #The path of pcap file
